name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  server:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: fintrack/server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: fintrack/server/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm test

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: fintrack/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: fintrack/web/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build
